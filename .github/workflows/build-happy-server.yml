name: Build Happy Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - scripts/**
      - patches/**
      - packages/happy-server/**
      - packages/happy-wire/**
      - packages/happy-agent/package.json
      - packages/happy-app/package.json
      - packages/happy-app/patches/**
      - packages/happy-cli/package.json
      - packages/happy-cli/scripts/**
      - packages/happy-cli/tools/**
      - .github/workflows/build-happy-server.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/happy-server:latest
            ghcr.io/${{ github.repository_owner }}/happy-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
